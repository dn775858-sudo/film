<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мультики и видео</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
      margin: 0;
    }

    header {
      display: flex;
      align-items: center;
      background: #001529;
      padding: 12px 16px;
      color: white;
    }

    .logo {
      font-weight: bold;
      font-size: 20px;
      margin-right: 24px;
    }

    .menu-item {
      margin-right: 16px;
      cursor: pointer;
    }

    .menu-item.active {
      text-decoration: underline;
      font-weight: bold;
    }

    .content {
      padding: 24px;
      background: #a373ff;
      min-height: 300px;
      border-radius: 12px;
      color: white;
      margin: 16px;
    }

    .card {
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .card-img-top {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .card-text-preview {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 6px 10px;
      font-size: 14px;
      display: none;
    }

    .card:hover .card-text-preview {
      display: block;
    }

    footer {
      text-align: center;
      background: #9b5cff;
      color: white;
      padding: 16px;
      margin-top: 24px;
    }

    /* modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 9999;
    }

    .modal-content {
      background: white;
      margin: 5% auto;
      padding: 20px;
      border-radius: 12px;
      max-width: 900px;
    }

    .modal-close {
      float: right;
      font-size: 26px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">LOGO</div>
  <span class="menu-item active">Мультики</span>
</header>

<div class="content">

  <h4>Популярные видео</h4>
  <div id="videos-row" class="row g-3 mb-4"></div>

  <h4>Мультфильмы</h4>
  <div id="cards-row" class="row g-3"></div>

</div>

<footer>
  <div><b>LOGO</b></div>
  <div>Made by Dildora</div>
  <div>© 2026</div>
</footer>

<!-- modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <h3 id="modal-title"></h3>
    <div id="modal-description"></div>
  </div>
</div>

<script>
  const videos = [
    { title: 'Hotel Transylvania', url: 'https://www.youtube.com/embed/t6-2M49KV68' },
    { title: 'Queen’s Dog', url: 'https://www.youtube.com/embed/bZP_3CU7EsQ' },
    { title: 'Turning Red', url: 'https://www.youtube.com/embed/KZcqB7xsqMA' },
    { title: 'Ne Zha 2', url: 'https://www.youtube.com/embed/_9Y13VNYUPI' },
  ];

  const videosRow = document.getElementById('videos-row');
  const cardsRow = document.getElementById('cards-row');

  const modal = document.getElementById('modal');
  const modalTitle = document.getElementById('modal-title');
  const modalDescription = document.getElementById('modal-description');
  const modalClose = document.querySelector('.modal-close');

  /* видео */
  videos.forEach(v => {
    const col = document.createElement('div');
    col.className = 'col-12 col-sm-6 col-md-3';
    col.innerHTML = `
      <h6>${v.title}</h6>
      <iframe width="100%" height="200" src="${v.url}" allowfullscreen></iframe>
    `;
    videosRow.appendChild(col);
  });

  /* 🔴 ПРАВИЛЬНОЕ ПОЛУЧЕНИЕ МУЛЬТИКОВ */
  fetch('https://zhamal-tv.netlify.app/cartoons/get_all')
    .then(res => res.json())
    .then(data => {
      console.log('API DATA:', data);

      const cartoons = Array.isArray(data)
        ? data
        : data.data || [];

      renderCards(cartoons);
    })
    .catch(() => {
      /* запасной вариант, чтобы сайт НЕ был пустым */
      renderCards([
        {
          title: 'Frozen',
          posterPath: 'https://via.placeholder.com/300x400',
          description: 'Мультфильм про дружбу и магию'
        }
      ]);
    });

  function renderCards(items) {
    cardsRow.innerHTML = '';

    items.forEach(item => {
      const col = document.createElement('div');
      col.className = 'col-12 col-sm-6 col-md-4 col-lg-3';

      col.innerHTML = `
        <div class="card">
          <img src="${item.posterPath || item.poster || 'https://via.placeholder.com/300x400'}" class="card-img-top">
          <div class="p-2">
            <h6>${item.title || item.name}</h6>
          </div>
          <div class="card-text-preview">
            ${(item.description || '').slice(0, 60)}
          </div>
        </div>
      `;

      col.onclick = () => openModal(item);
      cardsRow.appendChild(col);
    });
  }

  function openModal(item) {
    modal.style.display = 'block';
    modalTitle.innerText = item.title || item.name;
    modalDescription.innerHTML = `<p>${item.description || 'Описание отсутствует'}</p>`;
  }

  modalClose.onclick = () => modal.style.display = 'none';
  window.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };
</script>

</body>
</html>
