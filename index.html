<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мультики и видео</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fecfef);
      margin: 0;
    }

    header {
      background: #001529;
      color: white;
      padding: 12px 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .content {
      padding: 24px;
      background: #a373ff;
      min-height: 300px;
      border-radius: 12px;
      margin: 16px;
      color: white;
    }

    .card {
      cursor: pointer;
      transition: 0.3s;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .card-img-top {
      height: 280px;
      object-fit: cover;
    }

    .card-text-preview {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.65);
      padding: 6px;
      font-size: 14px;
      display: none;
    }

    .card:hover .card-text-preview {
      display: block;
    }

    footer {
      background: #9b5cff;
      color: white;
      text-align: center;
      padding: 16px;
      margin-top: 24px;
    }
  </style>
</head>

<body>

<header>
  LOGO
</header>

<div class="content">

  <h4>🎬 Популярные видео</h4>
  <div class="row g-3 mb-4">
    <div class="col-12 col-sm-6 col-md-3">
      <iframe width="100%" height="200" src="https://www.youtube.com/embed/t6-2M49KV68" allowfullscreen></iframe>
    </div>
    <div class="col-12 col-sm-6 col-md-3">
      <iframe width="100%" height="200" src="https://www.youtube.com/embed/bZP_3CU7EsQ" allowfullscreen></iframe>
    </div>
    <div class="col-12 col-sm-6 col-md-3">
      <iframe width="100%" height="200" src="https://www.youtube.com/embed/KZcqB7xsqMA" allowfullscreen></iframe>
    </div>
    <div class="col-12 col-sm-6 col-md-3">
      <iframe width="100%" height="200" src="https://www.youtube.com/embed/_9Y13VNYUPI" allowfullscreen></iframe>
    </div>
  </div>

  <h4>🧸 Мультфильмы</h4>
  <div id="cards-row" class="row g-3"></div>

</div>

<footer>
  <div><b>LOGO</b></div>
  <div>Made by Dildora</div>
  <div>© 2026</div>
</footer>

<script>
  const cartoons = [
    {
      title: 'Frozen',
      poster: 'https://via.placeholder.com/300x400',
      desc: 'История про дружбу, любовь и магию'
    },
    {
      title: 'Toy Story',
      poster: 'https://via.placeholder.com/300x400',
      desc: 'Приключения живых игрушек'
    },
    {
      title: 'Turning Red',
      poster: 'https://via.placeholder.com/300x400',
      desc: 'История про взросление и эмоции'
    },
    {
      title: 'Hotel Transylvania',
      poster: 'https://via.placeholder.com/300x400',
      desc: 'Отель для монстров и людей'
    }
  ];

  const cardsRow = document.getElementById('cards-row');

  cartoons.forEach(item => {
    const col = document.createElement('div');
    col.className = 'col-12 col-sm-6 col-md-4 col-lg-3';

    col.innerHTML = `
      <div class="card">
        <img src="${item.poster}" class="card-img-top">
        <div class="p-2">
          <h6>${item.title}</h6>
        </div>
        <div class="card-text-preview">${item.desc}</div>
      </div>
    `;

    cardsRow.appendChild(col);
  });
</script>

</body>
</html>
