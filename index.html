<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мультики и видео</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #a373ff; 
      margin:0; 
      padding:20px; 
      color:white;
      overflow-x:hidden;
    }
    header {background:#001529; color:white; padding:12px 16px; font-size:20px; font-weight:bold;}
    .content {padding:24px; border-radius:12px; background: #7b53ff; margin-top:16px; opacity:0; transform:translateY(50px); transition: 1s;}
    .content.show {opacity:1; transform:translateY(0);}
    .card {cursor:pointer; transition:0.3s; position:relative; border-radius:12px; overflow:hidden;}
    .card:hover {transform:scale(1.05); box-shadow:0 8px 20px rgba(0,0,0,0.3);}
    .card-img-top {height:280px; object-fit:cover;}
    .card-text-preview {position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.65); padding:6px; font-size:14px; display:none;}
    .card:hover .card-text-preview {display:block;}
    footer {background:#9b5cff; color:white; text-align:center; padding:16px; margin-top:24px;}
    
    /* Приветствие */
    #welcome {
      position:fixed;
      top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.85);
      display:flex;
      justify-content:center;
      align-items:center;
      color:#ffd700;
      font-size:36px;
      font-weight:bold;
      flex-direction:column;
      z-index:9999;
      opacity:1;
      transition: opacity 1s;
    }
    #welcome.hidden {opacity:0; pointer-events:none;}
    #welcome span {display:inline-block; animation: bounce 1s ease infinite alternate;}
    #welcome span:nth-child(2){animation-delay:0.2s;}
    #welcome span:nth-child(3){animation-delay:0.4s;}
    @keyframes bounce {
      from {transform: translateY(0);}
      to {transform: translateY(-20px);}
    }

    /* Модальное окно */
    .modal-content {background:#7b53ff; color:white;}
    .modal-header {border-bottom:none;}
    .modal-footer {border-top:none;}
    .modal-body img {width:100%; border-radius:12px; margin-bottom:16px;}
  </style>
</head>
<body>

<div id="welcome">
  <div>Добро пожаловать</div>
  <div>в мир мультфильмов!</div>
  <div>🎬🧸</div>
</div>

<header>LOGO</header>

<div class="content" id="mainContent">
  <h4>🎬 Популярные видео</h4>
  <div class="row g-3 mb-4">
    <div class="col-12 col-sm-6 col-md-3">
      <iframe width="100%" height="200" src="https://www.youtube.com/embed/t6-2M49KV68" allowfullscreen></iframe>
    </div>
    <div class="col-12 col-sm-6 col-md-3">
      <iframe width="100%" height="200" src="https://www.youtube.com/embed/bZP_3CU7EsQ" allowfullscreen></iframe>
    </div>
    <div class="col-12 col-sm-6 col-md-3">
      <iframe width="100%" height="200" src="https://www.youtube.com/embed/KZcqB7xsqMA" allowfullscreen></iframe>
    </div>
    <div class="col-12 col-sm-6 col-md-3">
      <iframe width="100%" height="200" src="https://www.youtube.com/embed/_9Y13VNYUPI" allowfullscreen></iframe>
    </div>
  </div>

  <h4>🧸 Мультфильмы</h4>
  <div class="row g-3" id="cards-row"></div>
</div>

<footer>
  <div><b>LOGO</b></div>
  <div>Made by Dildora</div>
  <div>© 2026</div>
</footer>

<!-- Модальное окно -->
<div class="modal fade" id="cartoonModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <img id="modalImg" src="">
        <p id="modalDesc"></p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Приветствие
  window.addEventListener('load', ()=>{
    setTimeout(()=>{
      document.getElementById('welcome').classList.add('hidden');
      document.getElementById('mainContent').classList.add('show');
    }, 3000);
  });

  // Массив 50 мультфильмов
  const cartoons = [];
  for(let i=1; i<=50; i++){
    cartoons.push({
      title: `Мультфильм ${i}`,
      description: `Это подробное описание мультфильма ${i}. Здесь можно написать сюжет, персонажей и интересные факты.`,
      img: `https://via.placeholder.com/300x400?text=Мультфильм+${i}` // заменишь на свои картинки
    });
  }

  // Генерация карточек
  const cardsRow = document.getElementById('cards-row');
  const modal = new bootstrap.Modal(document.getElementById('cartoonModal'));
  cartoons.forEach(c => {
    const col = document.createElement('div');
    col.className = "col-12 col-sm-6 col-md-4 col-lg-3";
    col.innerHTML = `
      <div class="card">
        <img src="${c.img}" class="card-img-top">
        <div class="p-2"><h6>${c.title}</h6></div>
        <div class="card-text-preview">${c.description}</div>
      </div>
    `;
    col.querySelector('.card').addEventListener('click', ()=> {
      document.getElementById('modalTitle').textContent = c.title;
      document.getElementById('modalImg').src = c.img;
      document.getElementById('modalDesc').textContent = c.description;
      modal.show();
    });
    cardsRow.appendChild(col);
  });
</script>

</body>
</html>
